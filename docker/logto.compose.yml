---
name: logto

services:
  server:
    depends_on:
      database:
        condition: service_healthy
    image: ghcr.io/logto-io/logto:1.30.1
    entrypoint: [ "sh", "-c", "npm run cli db seed -- --swe && npm start" ]
    ports:
      - 3010:3010
      - 3002:3002
    environment:
      TRUST_PROXY_HEADER: 1
      DB_URL: postgres://postgres:p0stgr3s@database:5432/logto
      PORT: 3010
      ENDPOINT:
      ADMIN_ENDPOINT:

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: p0stgr3s
      POSTGRES_DB: logto
    volumes:
      - ./pg:/var/lib/postgresql/data:rw
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
